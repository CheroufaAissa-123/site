<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Clustering visual</title>
  <desc id="desc">Clean scatter clusters with analytical rings and axes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1060" cy="98" r="120" fill="#14b8a6" opacity="0.1"/>
  <circle cx="130" cy="610" r="150" fill="#2563eb" opacity="0.07"/>

  <rect x="88" y="78" width="1024" height="519" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="4"/>
  <rect x="128" y="128" width="944" height="439" rx="20" fill="#f8fafc"/>

  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="180" y1="520" x2="1030" y2="520"/>
    <line x1="180" y1="520" x2="180" y2="184"/>
  </g>

  <g fill="none" stroke-width="3" opacity="0.5">
    <circle cx="314" cy="366" r="92" stroke="#3b82f6"/>
    <circle cx="612" cy="302" r="92" stroke="#10b981"/>
    <circle cx="872" cy="424" r="92" stroke="#f97316"/>
  </g>

  <g fill="#3b82f6">
    <circle cx="250" cy="378" r="11"/>
    <circle cx="286" cy="410" r="9"/>
    <circle cx="322" cy="354" r="10"/>
    <circle cx="350" cy="392" r="11"/>
    <circle cx="286" cy="336" r="10"/>
    <circle cx="338" cy="332" r="8"/>
  </g>

  <g fill="#10b981">
    <circle cx="550" cy="312" r="10"/>
    <circle cx="590" cy="340" r="9"/>
    <circle cx="626" cy="298" r="10"/>
    <circle cx="656" cy="334" r="11"/>
    <circle cx="580" cy="280" r="8"/>
    <circle cx="632" cy="274" r="9"/>
  </g>

  <g fill="#f97316">
    <circle cx="804" cy="432" r="10"/>
    <circle cx="840" cy="462" r="9"/>
    <circle cx="876" cy="416" r="10"/>
    <circle cx="912" cy="452" r="11"/>
    <circle cx="846" cy="404" r="9"/>
    <circle cx="898" cy="396" r="8"/>
  </g>

  <g stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="244" y1="196" x2="314" y2="170"/>
    <line x1="314" y1="170" x2="386" y2="190"/>
    <line x1="386" y1="190" x2="446" y2="164"/>
  </g>
</svg>
